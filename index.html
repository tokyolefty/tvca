<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>東京タワーヴュークリニック麻布十番</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #1c2b3a;
      --navy-deep: #111d28;
      --gold:      #b8935a;
      --gold-light:#d4ab72;
      --ivory:     #faf9f7;
      --white:     #ffffff;
      --stone:     #f2f0ec;
      --text:      #1e1e1e;
      --muted:     #6b6b6b;
      --border:    #e0ddd8;
      --shadow-sm: 0 2px 12px rgba(0,0,0,.06);
      --shadow-md: 0 8px 32px rgba(0,0,0,.10);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ivory);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      line-height: 1.8;
      font-weight: 300;
    }
    body.en {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      line-height: 1.65;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--navy-deep);
      color: rgba(255,255,255,.6);
      font-size: 12px;
      letter-spacing: .5px;
      padding: 8px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 20px; }
    .topbar-left span { display: flex; align-items: center; gap: 5px; }
    .topbar a { color: rgba(255,255,255,.6); text-decoration: none; }

    /* LANG TOGGLE — always in topbar */
    .lang-toggle {
      display: flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .lang-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,.5);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      padding: 4px 12px;
      cursor: pointer;
      transition: background .2s, color .2s;
      text-transform: uppercase;
    }
    .lang-btn.on {
      background: var(--gold);
      color: var(--white);
    }
    .lang-sep {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,.2);
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 200;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .hdr {
      max-width: 1200px; margin: 0 auto;
      padding: 0 32px; height: 72px;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
    }

    .brand { text-decoration: none; color: var(--text); flex-shrink: 0; }
    .brand-name {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: 18px; font-weight: 600; line-height: 1.2;
      letter-spacing: .3px; color: var(--navy);
    }
    .brand-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; font-weight: 400; color: var(--gold);
      letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
    }

    nav { display: flex; align-items: center; gap: 0; }
    nav a {
      text-decoration: none; color: var(--muted);
      font-size: 13px; font-weight: 500; letter-spacing: .5px;
      padding: 8px 16px; position: relative;
      transition: color .2s;
      white-space: nowrap;
    }
    nav a::after {
      content: ''; position: absolute; bottom: 0; left: 50%; right: 50%;
      height: 2px; background: var(--gold);
      transition: left .25s, right .25s;
    }
    nav a:hover { color: var(--navy); }
    nav a:hover::after { left: 16px; right: 16px; }

    .hdr-cta {
      background: var(--navy); color: var(--white);
      border: none; padding: 10px 22px; font-size: 13px; font-weight: 500;
      letter-spacing: .5px; cursor: pointer; text-decoration: none;
      transition: background .2s;
      white-space: nowrap; border-radius: 3px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .hdr-cta:hover { background: var(--gold); }

    .ham {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .ham span { width: 22px; height: 1.5px; background: var(--text); border-radius: 2px; display: block; }

    /* mobile nav */
    .mob-nav {
      display: none; background: var(--white);
      border-top: 1px solid var(--border); padding: 8px 24px 16px;
      flex-direction: column;
    }
    .mob-nav.open { display: flex; }
    .mob-nav a {
      color: var(--text); text-decoration: none; font-size: 15px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      letter-spacing: .3px;
    }
    .mob-nav a:last-child { border-bottom: none; }

    /* ── HERO ── */
    .hero {
      background: var(--navy);
      min-height: 600px;
      display: flex; align-items: center;
      position: relative; overflow: hidden;
    }
    /* subtle texture overlay */
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(135deg, rgba(28,43,58,.95) 0%, rgba(28,43,58,.80) 60%, rgba(28,43,58,.65) 100%);
    }
    /* faint geometric accent */
    .hero::after {
      content: '';
      position: absolute; right: -80px; top: -80px;
      width: 500px; height: 500px;
      border: 1px solid rgba(184,147,90,.15);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-inner {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: 100px 32px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
    }

    .hero-content {}

    .hero-eyebrow {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .hero-eyebrow-line { width: 32px; height: 1px; background: var(--gold); }
    .hero-eyebrow span {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); font-weight: 500;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: clamp(34px, 4.5vw, 58px);
      font-weight: 500; color: var(--white);
      line-height: 1.2; margin-bottom: 24px;
      letter-spacing: -.5px;
    }
    body.en .hero h1 { font-family: 'Cormorant Garamond', serif; }

    .hero-desc {
      font-size: 15px; color: rgba(255,255,255,.65);
      max-width: 440px; margin-bottom: 40px;
      line-height: 1.85;
    }

    .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }

    .btn-primary {
      background: var(--gold); color: var(--white);
      border: none; padding: 14px 32px;
      font-size: 13px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: background .2s, transform .2s;
      border-radius: 3px; display: inline-block;
    }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }

    .btn-outline {
      background: transparent; color: rgba(255,255,255,.8);
      border: 1px solid rgba(255,255,255,.3);
      padding: 14px 32px; font-size: 13px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: border-color .2s, color .2s;
      border-radius: 3px; display: inline-block;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    /* hero aside card */
    .hero-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px; padding: 36px;
      backdrop-filter: blur(8px);
    }
    .hero-card-title {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 24px; font-weight: 500;
    }
    .hc-item {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .hc-item:last-child { border-bottom: none; padding-bottom: 0; }
    .hc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin-top: 8px; flex-shrink: 0; }
    .hc-item p { font-size: 14px; color: rgba(255,255,255,.75); line-height: 1.6; }
    .hc-item strong { color: var(--white); font-weight: 500; display: block; margin-bottom: 2px; font-size: 14px; }

    /* ── DIVIDER ── */
    .divider-bar {
      background: var(--stone); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    .divider-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: stretch;
    }
    .d-stat {
      flex: 1; padding: 28px 20px;
      text-align: center; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .d-stat:last-child { border-right: none; }
    .d-num  { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; color: var(--navy); line-height: 1; }
    .d-unit { font-size: 11px; color: var(--gold); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
    .d-lbl  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── SECTIONS ── */
    section { padding: 96px 32px; }
    .wrap { max-width: 1200px; margin: 0 auto; }

    .sec-eyebrow {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    }
    .sec-eyebrow-line { width: 24px; height: 1px; background: var(--gold); }
    .sec-eyebrow span {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); font-weight: 500;
    }

    .sec-title {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: clamp(26px, 3.5vw, 40px); font-weight: 500;
      color: var(--navy); margin-bottom: 14px; line-height: 1.2;
    }
    body.en .sec-title { font-family: 'Cormorant Garamond', serif; }

    .sec-lead { color: var(--muted); max-width: 500px; margin-bottom: 56px; font-size: 15px; }

    /* ── SERVICES ── */
    #services { background: var(--white); }

    .svc-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
      background: var(--border); border: 1px solid var(--border);
    }

    .svc-card {
      background: var(--white); padding: 36px 32px;
      transition: background .25s;
      position: relative; overflow: hidden;
    }
    .svc-card::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--gold);
      transform: scaleX(0); transform-origin: left;
      transition: transform .3s;
    }
    .svc-card:hover { background: var(--stone); }
    .svc-card:hover::before { transform: scaleX(1); }

    .svc-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px; font-weight: 400; color: var(--border);
      line-height: 1; margin-bottom: 20px; transition: color .25s;
    }
    .svc-card:hover .svc-num { color: var(--gold); }

    .svc-card h3 {
      font-size: 15px; font-weight: 500; color: var(--navy);
      margin-bottom: 10px; letter-spacing: .3px;
    }
    .svc-card p { font-size: 13.5px; color: var(--muted); line-height: 1.8; }

    /* ── HOURS ── */
    #hours { background: var(--stone); }

    .hours-layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 48px; align-items: start; }

    .tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
    .tbl thead th {
      background: var(--navy); color: rgba(255,255,255,.85);
      padding: 14px 20px; text-align: left;
      font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
    }
    .tbl thead th:first-child { border-left: 3px solid var(--gold); }
    .tbl tbody td { padding: 14px 20px; border-bottom: 1px solid var(--border); color: var(--text); background: var(--white); }
    .tbl tbody tr:last-child td { border-bottom: none; }
    .t-open   { color: var(--navy); font-weight: 500; }
    .t-closed { color: var(--gold); font-weight: 400; font-style: italic; }

    .hours-aside {}
    .hours-aside h3 {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: 24px; font-weight: 500; color: var(--navy);
      margin-bottom: 28px;
    }
    body.en .hours-aside h3 { font-family: 'Cormorant Garamond', serif; }

    .info-item { display: flex; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .info-item:last-child { border-bottom: none; }
    .info-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 3px; display: block; }
    .info-item p { font-size: 14px; color: var(--text); line-height: 1.6; }
    .info-line { width: 1px; background: var(--gold); flex-shrink: 0; min-height: 40px; }

    /* ── ACCESS ── */
    #access { background: var(--white); }

    .access-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }

    .access-details h3 {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: 24px; font-weight: 500; color: var(--navy); margin-bottom: 28px;
    }
    body.en .access-details h3 { font-family: 'Cormorant Garamond', serif; }

    .a-item { display: flex; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .a-item:last-child { border-bottom: none; }
    .a-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 3px; display: block; }
    .a-line { width: 1px; background: var(--gold); flex-shrink: 0; min-height: 40px; }
    .a-item p { font-size: 14px; color: var(--text); line-height: 1.6; }
    .phone-link { color: var(--navy); font-size: 22px; font-weight: 600; font-family: 'Cormorant Garamond', serif; text-decoration: none; letter-spacing: 1px; }
    .phone-link:hover { color: var(--gold); }

    .map-box { border-radius: 4px; overflow: hidden; border: 1px solid var(--border); height: 420px; box-shadow: var(--shadow-md); }
    .map-box iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── CONTACT STRIP ── */
    .contact-strip {
      background: var(--navy-deep); color: var(--white);
      padding: 56px 32px;
      text-align: center;
    }
    .contact-strip .eyebrow {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px; font-weight: 500;
    }
    .contact-strip h2 {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: clamp(28px, 4vw, 44px); font-weight: 500;
      margin-bottom: 10px;
    }
    body.en .contact-strip h2 { font-family: 'Cormorant Garamond', serif; }
    .contact-strip .phone-big {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 56px); font-weight: 400; color: var(--gold);
      letter-spacing: 3px; margin: 20px 0 8px;
    }
    .contact-strip .hours-note { font-size: 13px; color: rgba(255,255,255,.5); letter-spacing: .5px; }

    /* ── FOOTER ── */
    footer { background: var(--navy); color: rgba(255,255,255,.6); padding: 60px 32px 28px; }
    .ftr { max-width: 1200px; margin: 0 auto; }
    .ftr-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 56px; margin-bottom: 48px; }
    .ftr-brand-name {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', serif;
      font-size: 18px; font-weight: 600; color: var(--white); margin-bottom: 4px;
    }
    .ftr-brand-sub { font-size: 11px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .ftr-brand p { font-size: 13px; line-height: 1.8; opacity: .65; }
    .ftr-col h4 { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .ftr-col a { display: block; color: rgba(255,255,255,.5); font-size: 13px; padding: 4px 0; text-decoration: none; transition: color .18s; }
    .ftr-col a:hover { color: var(--white); }
    .ftr-bottom {
      border-top: 1px solid rgba(255,255,255,.1); padding-top: 24px;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
      font-size: 12px; opacity: .4;
    }

    /* ── FADE IN ── */
    .fi { opacity: 0; transform: translateY(16px); transition: opacity .6s ease, transform .6s ease; }
    .fi.vis { opacity: 1; transform: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .hero-inner { grid-template-columns: 1fr; padding: 80px 32px; }
      .hero-card { display: none; }
      .svc-grid { grid-template-columns: 1fr 1fr; }
      .hours-layout, .access-layout { grid-template-columns: 1fr; }
      .ftr-grid { grid-template-columns: 1fr 1fr; }
      .ftr-brand { grid-column: 1 / -1; }
    }
    @media (max-width: 640px) {
      .topbar-left { display: none; }
      nav { display: none; }
      .ham { display: flex; }
      .hdr { padding: 0 20px; }
      section { padding: 64px 20px; }
      .svc-grid { grid-template-columns: 1fr; }
      .ftr-grid { grid-template-columns: 1fr; }
      .divider-inner { flex-wrap: wrap; }
      .d-stat { flex: 0 0 50%; border-bottom: 1px solid var(--border); }
      .d-stat:nth-child(2n) { border-right: none; }
      .d-stat:nth-last-child(-n+2) { border-bottom: none; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span>&#9679; <span data-i18n="topPhone"></span></span>
    <span data-i18n="topHours"></span>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn on" id="btnJP" onclick="setLang('jp')">JP</button>
    <div class="lang-sep"></div>
    <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="hdr">
    <a href="#" class="brand">
      <div class="brand-name" data-i18n="brandName"></div>
      <div class="brand-en"   data-i18n="brandSub"></div>
    </a>
    <nav>
      <a href="#services" data-i18n="navServices"></a>
      <a href="#hours"    data-i18n="navHours"></a>
      <a href="#access"   data-i18n="navAccess"></a>
    </nav>
    <a href="form.html" class="hdr-cta" data-i18n="navBook"></a>
    <button class="ham" onclick="toggleMob()"><span></span><span></span><span></span></button>
  </div>
  <nav class="mob-nav" id="mobNav">
    <a href="#services" onclick="toggleMob()" data-i18n="navServices"></a>
    <a href="#hours"    onclick="toggleMob()" data-i18n="navHours"></a>
    <a href="#access"   onclick="toggleMob()" data-i18n="navAccess"></a>
    <a href="form.html" data-i18n="navBook"></a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-content">
      <div class="hero-eyebrow">
        <div class="hero-eyebrow-line"></div>
        <span data-i18n="heroEyebrow"></span>
      </div>
      <h1 data-i18n-html="heroTitle"></h1>
      <p class="hero-desc" data-i18n="heroDesc"></p>
      <div class="hero-actions">
        <a href="form.html" class="btn-primary" data-i18n="heroBook"></a>
        <a href="#services"      class="btn-outline"  data-i18n="heroLearn"></a>
      </div>
    </div>

    <div class="hero-card">
      <div class="hero-card-title" data-i18n="cardTitle"></div>
      <div class="hc-item"><div class="hc-dot"></div><p><strong data-i18n="svc1Title"></strong><span data-i18n="svc1Short"></span></p></div>
      <div class="hc-item"><div class="hc-dot"></div><p><strong data-i18n="svc2Title"></strong><span data-i18n="svc2Short"></span></p></div>
      <div class="hc-item"><div class="hc-dot"></div><p><strong data-i18n="svc3Title"></strong><span data-i18n="svc3Short"></span></p></div>
      <div class="hc-item"><div class="hc-dot"></div><p><strong data-i18n="svc4Title"></strong><span data-i18n="svc4Short"></span></p></div>
    </div>
  </div>
</section>

<!-- STATS DIVIDER -->
<div class="divider-bar">
  <div class="divider-inner">
    <div class="d-stat">
      <div class="d-num">3</div>
      <div class="d-unit" data-i18n="statMinUnit"></div>
      <div class="d-lbl"  data-i18n="statMin"></div>
    </div>
    <div class="d-stat">
      <div class="d-num">EN</div>
      <div class="d-unit">/ JP</div>
      <div class="d-lbl" data-i18n="statBilingual"></div>
    </div>
    <div class="d-stat">
      <div class="d-num">6</div>
      <div class="d-unit" data-i18n="statDaysUnit"></div>
      <div class="d-lbl"  data-i18n="statDays"></div>
    </div>
    <div class="d-stat">
      <div class="d-num" style="font-size:26px;">Online</div>
      <div class="d-unit" data-i18n="statTeleUnit"></div>
      <div class="d-lbl"  data-i18n="statTele"></div>
    </div>
  </div>
</div>

<!-- SERVICES -->

function applyLang(lang) {
  const t = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (t[k] !== undefined) el.textContent = t[k];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const k = el.getAttribute('data-i18n-html');
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
}

function setLang(lang) {
  document.body.classList.toggle('en', lang === 'en');
  document.documentElement.lang = lang === 'en' ? 'en' : 'ja';
  document.getElementById('btnJP').classList.toggle('on', lang === 'jp');
  document.getElementById('btnEN').classList.toggle('on', lang === 'en');
  applyLang(lang);
  localStorage.setItem('tvca-lang', lang);
}

(function () {
  const saved    = localStorage.getItem('tvca-lang');
  const detected = (navigator.language || '').startsWith('ja') ? 'jp' : 'en';
  setLang(saved || detected);
})();

function toggleMob() { document.getElementById('mobNav').classList.toggle('open'); }

const obs = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); }),
  { threshold: 0.08 }
);
document.querySelectorAll('.fi').forEach(el => obs.observe(el));
